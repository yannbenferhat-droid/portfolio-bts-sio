<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Portfolio IT – Yann BEN FERHAT</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .landing-wrap {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0 20px;
      margin-top: var(--header-h);
      position: relative;
      overflow: hidden;
      background: linear-gradient(120deg, #101018 60%, #1c1e27 100%);
    }
    .landing-wrap::before {
      content: '';
      position: absolute;
      top: -160px; left: -90px;
      width: 600px; height: 600px;
      background: radial-gradient(circle at 25% 40%, rgba(90,200,250,0.12) 40%, transparent 80%);
      pointer-events: none;
      animation: moveGlow 9s ease-in-out infinite alternate;
    }
    @keyframes moveGlow {
      from { top: -160px; left: -90px; }
      to   { top: 80px; left: 200px; }
    }
    .landing-hero {
      max-width: 760px;
      text-align: center;
      z-index: 1;
      position: relative;
    }
    .landing-hero h1 {
      font-weight: 700;
      font-size: clamp(2.2rem, 5.5vw, 3.8rem);
      color: var(--accent);
      margin: 0 0 20px 0;
      line-height: 1.08;
      opacity: 0;
      animation: fadeSlide 0.9s forwards;
    }
    .landing-hero h1 .accent {
      background: linear-gradient(45deg, #5ac8fa, #35d1d5 75%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 700;
    }
    .divider {
      width: 52px; height: 3px;
      background: linear-gradient(90deg, #5ac8fa 0%, #33ffc1 100%);
      border-radius: 4px;
      margin: 0 auto 28px;
      opacity: 0;
      animation: fadeIn 1s forwards 0.5s;
    }
    .subtitle {
      font-size: 1.35rem;
      color: #c1eaff;
      letter-spacing: .04em;
      opacity: 0;
      animation: fadeIn 1s forwards 0.8s;
      margin-bottom: 10px;
    }
    .landing-hero p {
      font-weight: 500;
      font-size: 1.15rem;
      color: #c0cad8;
      max-width: 520px;
      margin: 0 auto;
      line-height: 1.7;
      opacity: 0;
      animation: fadeIn 1s forwards 1.1s;
    }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(-24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
</head>
<body>
<header></header>

<div class="landing-wrap">
  <div class="landing-hero">
    <h1>Bienvenue sur mon <span class="accent">Portfolio IT</span></h1>
    <div class="divider"></div>
    <div class="subtitle">Projets & Compétences – BTS SIO SISR</div>
    <p>Étudiant passionné par les infrastructures informatiques et la cybersécurité.<br>
       Découvrez mes réalisations et mon parcours.</p>
    <a href="profil.html" class="btn-primary" style="margin-top:32px;">Voir mon profil</a>
  </div>
</div>

<footer></footer>
<script src="nav.js"></script>
</body>
</html>
