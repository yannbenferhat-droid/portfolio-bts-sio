<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Missions E6 – Yann BEN FERHAT</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .e6-page {
      max-width: 900px;
      width: 90%;
      margin: calc(var(--header-h) + 32px) auto 48px auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .e6-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      opacity: 0;
      animation: fadeUp 0.5s forwards 0.05s;
    }
    .e6-title { font-size: 1.7rem; font-weight: 700; color: #f3f4f6; letter-spacing: -0.02em; }
    .e6-title span { color: var(--accent2); }

    /* Stats */
    .e6-stats {
      display: flex; gap: 10px; flex-wrap: wrap;
      opacity: 0; animation: fadeUp 0.5s forwards 0.1s;
    }
    .stat-chip { display: inline-flex; align-items: center; gap: 7px; padding: 5px 13px; border-radius: 999px; font-size: 0.85rem; font-weight: 600; }
    .stat-chip.done  { background: rgba(52,211,153,0.1);  border: 1px solid rgba(52,211,153,0.25); color: #34d399; }
    .stat-chip.empty { background: rgba(100,116,139,0.1); border: 1px solid rgba(100,116,139,0.2); color: #64748b; }
    .stat-dot { width: 7px; height: 7px; border-radius: 50%; }
    .stat-chip.done  .stat-dot { background: #34d399; }
    .stat-chip.empty .stat-dot { background: #7a8fa0; }

    /* Grille 2 colonnes */
    .missions-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      opacity: 0;
      animation: fadeUp 0.5s forwards 0.15s;
    }
    @media(max-width: 620px) { .missions-grid { grid-template-columns: 1fr; } }

    .mission-card {
      background: rgba(28, 30, 42, 0.98);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 14px rgba(0,0,0,0.18);
      display: flex;
      flex-direction: column;
      transition: border-color 0.25s, box-shadow 0.25s, transform 0.2s;
    }
    .mission-card:hover {
      border-color: rgba(52,211,153,0.2);
      box-shadow: 0 6px 28px rgba(0,0,0,0.28);
      transform: translateY(-2px);
    }
    .mission-card.is-empty {
      opacity: 0.38;
    }
    .mission-card.is-empty:hover {
      transform: none;
      border-color: rgba(255,255,255,0.05);
      box-shadow: 0 2px 14px rgba(0,0,0,0.18);
    }

    .mission-top {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 18px 18px 14px 18px;
      flex: 1;
    }
    .mission-num {
      width: 36px; height: 36px; border-radius: 6px;
      background: rgba(52,211,153,0.07); border: 1px solid rgba(52,211,153,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; font-weight: 700; color: #34d399; flex-shrink: 0;
    }
    .mission-card.is-empty .mission-num {
      background: rgba(100,116,139,0.07);
      border-color: rgba(100,116,139,0.15);
      color: #475569;
    }
    .mission-info { flex: 1; }
    .mission-name { font-size: 0.96rem; font-weight: 600; color: #cdd5e0; margin-bottom: 4px; line-height: 1.35; }
    .mission-meta { font-size: 0.81rem; color: #8aaabb; margin-bottom: 8px; }

    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 999px;
      font-size: 0.78rem; font-weight: 700; letter-spacing: 0.03em;
    }
    .badge.done    { background: rgba(52,211,153,0.1);  border: 1px solid rgba(52,211,153,0.25);  color: #34d399; }
    .badge.pending { background: rgba(100,116,139,0.08); border: 1px solid rgba(100,116,139,0.15); color: #64748b; }

    .mission-divider {
      height: 1px;
      background: rgba(255,255,255,0.05);
      margin: 0 18px;
    }

    .mission-links {
      display: flex;
    }
    .mission-link-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      flex: 1;
      padding: 9px 14px;
      text-decoration: none;
      color: #7a8fa0;
      font-size: 0.8rem;
      font-weight: 600;
      transition: background 0.18s, color 0.18s;
      border-right: 1px solid rgba(255,255,255,0.05);
    }
    .mission-link-btn:last-child { border-right: none; }
    .mission-link-btn:hover { background: rgba(255,255,255,0.04); }

    .mission-link-btn.type-annexe:hover  { color: #34d399; }
    .mission-link-btn.type-livrable:hover { color: #fb923c; }

    .mission-link-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
    .mission-link-btn.type-annexe  svg { color: #34d399; }
    .mission-link-btn.type-livrable svg { color: #fb923c; }

    .link-label { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .link-arrow { font-size: 0.85rem; opacity: 0.45; transition: opacity 0.18s, transform 0.18s; }
    .mission-link-btn:hover .link-arrow { opacity: 1; transform: translateX(2px); }

    @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>
<header></header>

<div class="e6-page">

  <div class="e6-header">
    <div class="e6-title">Mises en situation <span>E6</span></div>
  </div>

  <div class="e6-stats">
    <div class="stat-chip done"><span class="stat-dot"></span>1 terminée</div>
    <div class="stat-chip empty"><span class="stat-dot"></span>1 à venir</div>
  </div>

  <div class="missions-grid">

    <!-- Situation 1 -->
    <div class="mission-card">
      <div class="mission-top">
        <div class="mission-num">01</div>
        <div class="mission-info">
          <div class="mission-name">Déploiement Active Directory multi-contrôleurs</div>
          <div class="mission-meta">AURLOM – AD DS · DNS · DHCP · PowerShell · Proxmox</div>
          <div class="badge done">Terminée</div>
        </div>
      </div>
      <div class="mission-divider"></div>
      <div class="mission-links">
        <a href="https://yannbenferhat-droid.github.io/portfolio-bts-sio/docs/E6_Situation1_production.pdf" target="_blank" rel="noopener noreferrer" class="mission-link-btn type-livrable">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <span class="link-label">Production</span>
          <span class="link-arrow">↗</span>
        </a>
        <a href="https://yannbenferhat-droid.github.io/portfolio-bts-sio/docs/E6_Situation1_documentation.pdf" target="_blank" rel="noopener noreferrer" class="mission-link-btn type-annexe">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
          <span class="link-label">Documentation</span>
          <span class="link-arrow">↗</span>
        </a>
      </div>
    </div>

    <!-- Situation 2 -->
    <div class="mission-card is-empty">
      <div class="mission-top">
        <div class="mission-num">02</div>
        <div class="mission-info">
          <div class="mission-name">Mise en situation à venir</div>
          <div class="mission-meta">—</div>
          <div class="badge pending">À venir</div>
        </div>
      </div>
      <div class="mission-divider"></div>
      <div class="mission-links">
        <a href="https://yannbenferhat-droid.github.io/portfolio-bts-sio/docs/E6_Situation2_documentation.pdf" target="_blank" rel="noopener noreferrer" class="mission-link-btn type-annexe">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
          <span class="link-label">Documentation (à venir)</span>
          <span class="link-arrow">↗</span>
        </a>
        <a href="https://yannbenferhat-droid.github.io/portfolio-bts-sio/docs/E6_Situation2_production.pdf" target="_blank" rel="noopener noreferrer" class="mission-link-btn type-livrable">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <span class="link-label">Production (à venir)</span>
          <span class="link-arrow">↗</span>
        </a>
      </div>
    </div>

  </div>
</div>

<footer></footer>
<script src="nav.js"></script>
</body>
</html>
